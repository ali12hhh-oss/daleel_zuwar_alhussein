name: بناء تطبيق دليل زوار الحسين (APK)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout الكود
        uses: actions/checkout@v4

      - name: تثبيت Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: تثبيت Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: إنشاء android/local.properties
        run: |
          FLUTTER_SDK_PATH="$(dirname "$(dirname "$(which flutter)")")"
          echo "flutter.sdk=$FLUTTER_SDK_PATH" > android/local.properties
          cat android/local.properties

      - name: تحميل حزم Flutter
        run: flutter pub get

      # ✅ إصلاح مكتبة geolocator_android - الحل الجذري
      - name: إصلاح ملف build.gradle لـ geolocator_android
        run: |
          GEOLOCATOR_GRADLE="$HOME/.pub-cache/hosted/pub.dev/geolocator_android-4.6.2/android/build.gradle"
          if [ -f "$GEOLOCATOR_GRADLE" ]; then
            echo "=== قبل الإصلاح ==="
            cat "$GEOLOCATOR_GRADLE"
            
            # استبدال flutter.compileSdkVersion بـ compileSdk 34
            sed -i 's/flutter\.compileSdkVersion/34/g' "$GEOLOCATOR_GRADLE"
            
            # استبدال flutter.minSdkVersion بـ minSdk 21
            sed -i 's/flutter\.minSdkVersion/21/g' "$GEOLOCATOR_GRADLE"
            
            # استبدال flutter.targetSdkVersion بـ targetSdk 34
            sed -i 's/flutter\.targetSdkVersion/34/g' "$GEOLOCATOR_GRADLE"
            
            # إزالة أي سطر يحتوي على flutter { source = ".." }
            sed -i '/flutter\s*{/d' "$GEOLOCATOR_GRADLE"
            sed -i '/source\s*=/d' "$GEOLOCATOR_GRADLE"
            sed -i '/}/d' "$GEOLOCATOR_GRADLE"
            
            echo "=== بعد الإصلاح ==="
            cat "$GEOLOCATOR_GRADLE"
          else
            echo "ملف geolocator_android build.gradle غير موجود"
            find "$HOME/.pub-cache" -name "build.gradle" -path "*geolocator_android*" 2>/dev/null
          fi

      - name: توليد ملفات Gradle Wrapper عبر مشروع تجريبي معزول
        run: |
          set -e
          flutter create --platforms=android --org com.wraptemp /tmp/wrapper_ref
          cp /tmp/wrapper_ref/android/gradlew "$GITHUB_WORKSPACE/android/gradlew"
          cp /tmp/wrapper_ref/android/gradlew.bat "$GITHUB_WORKSPACE/android/gradlew.bat"
          mkdir -p "$GITHUB_WORKSPACE/android/gradle/wrapper"
          cp /tmp/wrapper_ref/android/gradle/wrapper/gradle-wrapper.jar "$GITHUB_WORKSPACE/android/gradle/wrapper/gradle-wrapper.jar"
          chmod +x "$GITHUB_WORKSPACE/android/gradlew"
          rm -rf /tmp/wrapper_ref
          echo "--- محتوى gradle-wrapper.properties (يجب أن يبقى 8.7) ---"
          cat "$GITHUB_WORKSPACE/android/gradle/wrapper/gradle-wrapper.properties"
          echo "تم نسخ سكربتات Gradle Wrapper بنجاح:"
          ls -la "$GITHUB_WORKSPACE/android/gradlew" "$GITHUB_WORKSPACE/android/gradle/wrapper/"

      - name: توليد أيقونة التطبيق (تحديث احتياطي)
        run: dart run flutter_launcher_icons || true

      - name: تحليل الكود (اختياري)
        run: flutter analyze || true

      - name: بناء APK (Release)
        run: flutter build apk --release

      - name: رفع ملف APK كمخرَج (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: daleel-zuwar-alhussein-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: إنشاء إصدار (Release) على GitHub
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "نسخة تجريبية #${{ github.run_number }}"
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
