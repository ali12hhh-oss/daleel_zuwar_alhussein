name: بناء تطبيق دليل زوار الحسين (APK)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout الكود
        uses: actions/checkout@v4

      - name: تثبيت Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: تثبيت Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: إنشاء android/local.properties
        run: |
          FLUTTER_SDK_PATH="$(dirname "$(dirname "$(which flutter)")")"
          echo "flutter.sdk=$FLUTTER_SDK_PATH" > android/local.properties
          cat android/local.properties

      - name: تحميل حزم Flutter
        run: |
          flutter pub upgrade
          flutter pub get

      - name: إصلاح ملف build.gradle لـ geolocator_android
        run: |
          GEO_FILE=$(find "$HOME/.pub-cache/hosted/pub.dev" -path "*/geolocator_android-*/android/build.gradle" | head -1)
          if [ -n "$GEO_FILE" ]; then
            cat > "$GEO_FILE" << 'EOF'
          group 'com.baseflow.geolocator'
          version '1.0-SNAPSHOT'

          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }

          rootProject.allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          apply plugin: 'com.android.library'

          android {
              namespace 'com.baseflow.geolocator'
              compileSdk 34
              
              defaultConfig {
                  minSdk 21
                  targetSdk 34
                  testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
              }
              
              lintOptions {
                  disable 'InvalidPackage'
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.core:core:1.10.1'
              implementation 'com.google.android.gms:play-services-location:21.0.1'
          }
          EOF
          fi

      - name: توليد ملفات Gradle Wrapper
        run: |
          set -e
          flutter create --platforms=android --org com.wraptemp /tmp/wrapper_ref
          cp /tmp/wrapper_ref/android/gradlew "$GITHUB_WORKSPACE/android/gradlew"
          cp /tmp/wrapper_ref/android/gradlew.bat "$GITHUB_WORKSPACE/android/gradlew.bat"
          mkdir -p "$GITHUB_WORKSPACE/android/gradle/wrapper"
          cp /tmp/wrapper_ref/android/gradle/wrapper/gradle-wrapper.jar "$GITHUB_WORKSPACE/android/gradle/wrapper/gradle-wrapper.jar"
          chmod +x "$GITHUB_WORKSPACE/android/gradlew"
          rm -rf /tmp/wrapper_ref

      - name: توليد أيقونة التطبيق
        run: dart run flutter_launcher_icons || true

      - name: تحليل الكود
        run: flutter analyze || true

      - name: بناء APK (Release)
        run: flutter build apk --release

      - name: رفع ملف APK كمخرَج
        uses: actions/upload-artifact@v4
        with:
          name: daleel-zuwar-alhussein-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: إنشاء إصدار على GitHub
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "نسخة تجريبية #${{ github.run_number }}"
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
