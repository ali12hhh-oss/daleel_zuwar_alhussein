name: بناء تطبيق دليل زوار الحسين (APK)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout الكود
        uses: actions/checkout@v4

      - name: تثبيت Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: تثبيت Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # مجلد android/ مُضمَّن مسبقاً في المشروع (لا نستخدم flutter create هنا
      # حتى لا تُفقد أي تخصيصات كملف AndroidManifest أو build.gradle).
      # يحتاج settings.gradle.kts إلى ملف android/local.properties لمعرفة
      # مسار تثبيت Flutter SDK؛ هذا الملف عادة يولّده Flutter تلقائياً، لكن
      # ننشئه هنا يدوياً كخطوة احترازية مبكرة.
      - name: إنشاء android/local.properties
        run: |
          FLUTTER_SDK_PATH="$(dirname "$(dirname "$(which flutter)")")"
          echo "flutter.sdk=$FLUTTER_SDK_PATH" > android/local.properties
          cat android/local.properties

      - name: تحميل حزم Flutter
        run: flutter pub get

      # الحل الجذري لملفات Gradle Wrapper: بدل تشغيل أمر "gradle" يدوياً (الذي
      # أثبت هشاشته بسبب فروقات إصدارات Gradle/Groovy مع سكربتات Flutter)،
      # نجعل أداة Flutter نفسها تُنشئ مشروعاً تجريبياً معزولاً بأمر
      # "flutter create" (وهو مصمم لهذا الغرض ويعمل دائماً بنجاح مضموناً مع
      # أي نسخة Flutter مثبَّتة)، ثم ننسخ منه فقط سكربتات التشغيل العامة
      # (gradlew, gradlew.bat, gradle-wrapper.jar) — وهذه سكربتات عامة لا
      # ترتبط بإصدار Gradle معيّن (تقرأ الإصدار من gradle-wrapper.properties
      # وقت التشغيل). لذلك **لا ننسخ** gradle-wrapper.properties من المشروع
      # التجريبي، لأنه يحمل إصدار Gradle قديماً من قالب Flutter الافتراضي
      # (7.6.3) غير متوافق مع AGP 8.5.1 الذي نستخدمه؛ نُبقي على ملفنا الخاص
      # المثبَّت مسبقاً على الإصدار 8.7 المتوافق.
      - name: توليد ملفات Gradle Wrapper عبر مشروع تجريبي معزول
        run: |
          set -e
          flutter create --platforms=android --org com.wraptemp /tmp/wrapper_ref
          cp /tmp/wrapper_ref/android/gradlew "$GITHUB_WORKSPACE/android/gradlew"
          cp /tmp/wrapper_ref/android/gradlew.bat "$GITHUB_WORKSPACE/android/gradlew.bat"
          mkdir -p "$GITHUB_WORKSPACE/android/gradle/wrapper"
          cp /tmp/wrapper_ref/android/gradle/wrapper/gradle-wrapper.jar "$GITHUB_WORKSPACE/android/gradle/wrapper/gradle-wrapper.jar"
          chmod +x "$GITHUB_WORKSPACE/android/gradlew"
          rm -rf /tmp/wrapper_ref
          echo "--- محتوى gradle-wrapper.properties (يجب أن يبقى 8.7) ---"
          cat "$GITHUB_WORKSPACE/android/gradle/wrapper/gradle-wrapper.properties"
          echo "تم نسخ سكربتات Gradle Wrapper بنجاح:"
          ls -la "$GITHUB_WORKSPACE/android/gradlew" "$GITHUB_WORKSPACE/android/gradle/wrapper/"

      - name: توليد أيقونة التطبيق (تحديث احتياطي، الأيقونات مُضمَّنة أصلاً في المشروع)
        run: dart run flutter_launcher_icons || true

      - name: تحليل الكود (اختياري، لا يوقف البناء عند التحذيرات)
        run: flutter analyze || true

      - name: بناء APK (Release)
        run: flutter build apk --release

      - name: رفع ملف APK كمخرَج (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: daleel-zuwar-alhussein-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: إنشاء إصدار (Release) على GitHub يحتوي الـ APK
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "نسخة تجريبية #${{ github.run_number }}"
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
