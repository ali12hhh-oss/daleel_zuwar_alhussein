name: بناء تطبيق دليل زوار الحسين (APK)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout الكود
        uses: actions/checkout@v4

      - name: تثبيت Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: تثبيت Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # مجلد android/ مُضمَّن مسبقاً في المشروع (لا نستخدم flutter create هنا
      # حتى لا تُفقد أي تخصيصات كملف AndroidManifest أو build.gradle).
      # يحتاج settings.gradle.kts إلى ملف android/local.properties لمعرفة
      # مسار تثبيت Flutter SDK؛ هذا الملف عادة يولّده Flutter تلقائياً، لكن
      # ننشئه هنا يدوياً لأننا سنستدعي Gradle مباشرة (خطوة توليد الـ wrapper)
      # قبل أول أمر Flutter يلمس مجلد أندرويد.
      - name: إنشاء android/local.properties
        run: |
          FLUTTER_SDK_PATH="$(dirname "$(dirname "$(which flutter)")")"
          echo "flutter.sdk=$FLUTTER_SDK_PATH" > android/local.properties
          cat android/local.properties

      - name: تحميل حزم Flutter
        run: flutter pub get

      # نولّد فقط سكربتات وملف Gradle Wrapper (gradlew) تلقائياً لأنها ملفات
      # بناء (bootstrap) قياسية وليست جزءاً من الكود المصدري.
      # نُثبّت إصدار Gradle 8.7 هنا تحديداً (بدل الأحدث تلقائياً) لأن سكربتات
      # Flutter الداخلية (Groovy) غير متوافقة مع Gradle 9+.
      - name: توليد Gradle Wrapper
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: بناء سكربتات gradlew
        working-directory: android
        run: gradle wrapper --gradle-version 8.7 --distribution-type all

      - name: توليد أيقونة التطبيق (تحديث احتياطي، الأيقونات مُضمَّنة أصلاً في المشروع)
        run: dart run flutter_launcher_icons || true

      - name: تحليل الكود (اختياري، لا يوقف البناء عند التحذيرات)
        run: flutter analyze || true

      - name: بناء APK (Release)
        run: flutter build apk --release

      - name: رفع ملف APK كمخرَج (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: daleel-zuwar-alhussein-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: إنشاء إصدار (Release) على GitHub يحتوي الـ APK
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "نسخة تجريبية #${{ github.run_number }}"
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
