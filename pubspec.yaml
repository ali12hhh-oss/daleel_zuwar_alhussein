name: daleel_zuwar_alhussein
description: "دليل زوار الحسين - تطبيق ديني حسيني شامل"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  geolocator: ^11.0.0
  url_launcher: ^6.2.5
  google_fonts: ^6.2.1
  adhan: ^2.0.0
  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.2
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  sqflite: ^2.3.0
  dio: ^5.4.0
  flutter_map_cache: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  geolocator_android: ^4.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png
    - assets/books/ahilla.pdf

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0B4D3C"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
